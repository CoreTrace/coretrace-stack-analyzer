# CoreTrace analyzer default config
# Priority: CLI flags > this config > built-in defaults

# Models
resource-model=models/resource-lifetime/generic.txt
escape-model=models/stack-escape/generic.txt
buffer-model=models/buffer-overflow/generic.txt

# Inputs and analysis profile
# compile-commands=build/compile_commands.json
analysis-profile=full
jobs=auto
compile-ir-cache-dir=.cache/compile-ir

# Output behavior
warnings-only=false
demangle=true
timing=false

# Inter-TU analysis
resource-cross-tu=true
uninitialized-cross-tu=true
resource-summary-cache-dir=.cache/resource-lifetime
resource-summary-cache-memory-only=false

# SMT configuration
smt=on
smt-backend=z3
# Keep single mode by default for deterministic behavior.
smt-mode=single
smt-timeout-ms=80
smt-budget-nodes=20000
smt-rules=recursion,integer-overflow,size-minus-k,stack-buffer,oob-read
