name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version tag override (example: v0.2.0)."
        required: false
        default: ""
      push_latest:
        description: "Also publish the latest tag."
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_RUNTIME: ghcr.io/${{ github.repository_owner }}/coretrace-stack-analyzer
  IMAGE_CI: ghcr.io/${{ github.repository_owner }}/coretrace-stack-analyzer-ci

jobs:
  publish:
    name: Build and push images to GHCR
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          short_sha="$(git rev-parse --short=12 HEAD)"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="sha-${short_sha}"
          fi

          push_latest="false"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            push_latest="true"
          elif [[ "${{ github.event.inputs.push_latest }}" == "true" ]]; then
            push_latest="true"
          fi

          runtime_tags="${IMAGE_RUNTIME}:${version}"$'\n'"${IMAGE_RUNTIME}:sha-${short_sha}"
          ci_tags="${IMAGE_CI}:${version}"$'\n'"${IMAGE_CI}:sha-${short_sha}"

          if [[ "${push_latest}" == "true" ]]; then
            runtime_tags+=$'\n'"${IMAGE_RUNTIME}:latest"
            ci_tags+=$'\n'"${IMAGE_CI}:latest"
          fi

          {
            echo "runtime_tags<<EOF"
            echo "${runtime_tags}"
            echo "EOF"
            echo "ci_tags<<EOF"
            echo "${ci_tags}"
            echo "EOF"
            echo "version=${version}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.runtime_tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: ${{ steps.tags.outputs.ci_tags }}
          platforms: linux/amd64
          build-args: |
            CORETRACE_RUNTIME_IMAGE=${{ env.IMAGE_RUNTIME }}:${{ steps.tags.outputs.version }}
            VERSION=${{ steps.tags.outputs.version }}
            VCS_REF=${{ steps.tags.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
